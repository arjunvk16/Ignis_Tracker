@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
.glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
.dark .glass { background: rgba(15, 23, 42, 0.8); }
.tab-active { color: #3b82f6; transform: translateY(-2px); }
.tab-active::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #3b82f6; border-radius: 50%; }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const config = {
apiKey: "AIzaSyAJ9K9fQ0ThMB7aXB6qNHr3_yLUdqJgnCM",
authDomain: "my-chain-reaction-game.firebaseapp.com",
projectId: "my-chain-reaction-game",
storageBucket: "my-chain-reaction-game.appspot.com",
messagingSenderId: "32751418407",
appId: "1:32751418407:web:ff8244007ef2b099d56202"
};

const app = initializeApp(config);
const auth = getAuth(app);
const db = getFirestore(app);
let expensesData = [];
let categoryChart = null, timelineChart = null;

// --- THEME TOGGLE & CAR SWEEP ---
const themeBtn = document.getElementById('theme-toggle');
const html = document.documentElement;

if (localStorage.getItem('theme') === 'dark') {
    html.classList.add('dark');
}

themeBtn.onclick = () => {
    const isDark = html.classList.contains('dark');
    const overlay = document.getElementById('theme-transition-overlay');
    const sweep = document.getElementById('theme-sweep');
    const carWrapper = document.getElementById('theme-car-wrapper');

    overlay.classList.remove('hidden');
    overlay.style.opacity = '1';
    sweep.style.transition = 'none';
    sweep.style.width = '0vw';

    if (!isDark) {
        sweep.className = "absolute top-0 bottom-0 left-0 bg-slate-950 flex items-center";
        carWrapper.className = "absolute top-1/2 right-[-65px] text-blue-600";
        carWrapper.style.transform = "translateY(-50%) scaleX(1)";
    } else {
        sweep.className = "absolute top-0 bottom-0 right-0 bg-slate-50 flex items-center";
        carWrapper.className = "absolute top-1/2 left-[-65px] text-blue-600";
        carWrapper.style.transform = "translateY(-50%) scaleX(-1)";
    }

    setTimeout(() => {
        sweep.style.transition = 'width 1s cubic-bezier(0.645, 0.045, 0.355, 1)';
        sweep.style.width = '100vw';

        setTimeout(() => {
            html.classList.toggle('dark');
            localStorage.setItem('theme', !isDark ? 'dark' : 'light');
            updateCharts();
            
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.classList.add('hidden');
                sweep.style.width = '0vw';
            }, 400);
        }, 1000); 
    }, 20);
};

// --- TAB SWITCHER ---
window.switchTab = (tab) => {
document.getElementById('view-dashboard').classList.add('hidden');
document.getElementById('view-add').classList.add('hidden');
document.getElementById('view-history').classList.add('hidden');

document.getElementById(`view-${tab}`).classList.remove('hidden');

const btns = ['dash', 'hist'];
btns.forEach(b => {
document.getElementById(`btn-${b}`).classList.remove('tab-active');
document.getElementById(`btn-${b}`).classList.add('text-slate-400', 'dark:text-slate-500');
});

if(tab !== 'add') {
const activeBtn = document.getElementById(`btn-${tab === 'dashboard' ? 'dash' : 'hist'}`);
activeBtn.classList.add('tab-active');
activeBtn.classList.remove('text-slate-400', 'dark:text-slate-500');
}

if(tab === 'dashboard') updateCharts();
};

document.getElementById('date').valueAsDate = new Date();

// --- DYNAMIC FIELDS WITH LITERS INPUT ---
const categorySelect = document.getElementById('category');
const dynamicFields = document.getElementById('dynamic-fields');

// Show fuel input by default
dynamicFields.innerHTML = `
    <label class="text-[10px] font-bold text-slate-400 uppercase">Fuel Volume (Liters)</label>
    <input type="number" step="0.01" id="dyn_fuel_liters" class="w-full bg-transparent font-bold py-1 outline-none dark:text-white appearance-none" placeholder="e.g. 30.5">
`;
dynamicFields.classList.remove('hidden');

categorySelect.addEventListener('change', (e) => {
const val = e.target.value;
dynamicFields.innerHTML = ''; 
dynamicFields.classList.remove('hidden');

if (val === 'fuel') {
    dynamicFields.innerHTML = `
        <label class="text-[10px] font-bold text-slate-400 uppercase">Fuel Volume (Liters)</label>
        <input type="number" step="0.01" id="dyn_fuel_liters" class="w-full bg-transparent font-bold py-1 outline-none dark:text-white appearance-none" placeholder="e.g. 30.5">
    `;
} else if (val === 'wiper_change') {
    dynamicFields.innerHTML = `
       <label class="text-[10px] font-bold text-slate-400 uppercase">Wiper Position</label>
       <select id="dyn_wiper_pos" class="w-full bg-transparent font-bold py-2 outline-none dark:text-white appearance-none border-b border-slate-300 dark:border-slate-600">
           <option value="Front Only" class="text-slate-800">Front Both</option>
           <option value="Back Only" class="text-slate-800">Back/Rear Only</option>
           <option value="Front and Back" class="text-slate-800">Front & Back (All)</option>
       </select>
   `;
} else if (val === 'tyre_change') {
    dynamicFields.innerHTML = `
       <label class="text-[10px] font-bold text-slate-400 uppercase">Number of Tyres Replaced</label>
       <input type="number" id="dyn_tyre_qty" min="1" max="5" value="4" class="w-full bg-transparent font-bold py-1 outline-none dark:text-white border-b border-slate-300 dark:border-slate-600">
   `;
} else if (val === 'tyre_pressure') {
    // NEW: Tyre Pressure Input Field
    dynamicFields.innerHTML = `
       <label class="text-[10px] font-bold text-slate-400 uppercase">Tyre Pressure (PSI)</label>
       <input type="number" id="dyn_tyre_psi" placeholder="e.g. 32" class="w-full bg-transparent font-bold py-1 outline-none dark:text-white border-b border-slate-300 dark:border-slate-600">
   `;
} else {
    dynamicFields.classList.add('hidden');
}
});

// --- CATEGORY INSIGHTS WITH PUC & TYRE PRESSURE LOGIC ---
const insightSelect = document.getElementById('insight-category');
insightSelect.addEventListener('change', updateInsights);

function updateInsights() {
    const selectedCat = insightSelect.value;
    let sum = 0, count = 0;
    let latestDate = null;
    let latestDetails = null;
    
    // Process Data
    expensesData.forEach(item => {
        if (item.category === selectedCat) {
            sum += item.cost || 0;
            count++;
            
            // Track the most recent entry for special category displays
            let itemDate = new Date(item.date).getTime();
            if (!latestDate || itemDate > latestDate) {
                latestDate = itemDate;
                latestDetails = item.details;
            }
        }
    });

    // Grab DOM Elements
    const lbl1 = document.getElementById('insight-label-1');
    const lbl2 = document.getElementById('insight-label-2');
    const val1 = document.getElementById('insight-total');
    const val2 = document.getElementById('insight-count');

    // Dynamic Display Logic
    if (selectedCat === 'puc' && latestDate) {
        lbl1.innerText = "Days Remaining";
        lbl2.innerText = "Last Taken";
        
        const now = new Date().getTime();
        // 365 Days validity
        const expiryDate = latestDate + (365 * 24 * 60 * 60 * 1000);
        const daysLeft = Math.ceil((expiryDate - now) / (1000 * 60 * 60 * 24));
        
        if (daysLeft > 0) {
            val1.innerText = daysLeft;
            val1.className = "text-2xl font-black text-blue-600 dark:text-blue-400";
        } else {
            val1.innerText = "Expired";
            val1.className = "text-2xl font-black text-red-600 dark:text-red-400";
        }
        val2.innerText = new Date(latestDate).toLocaleDateString();

    } else if (selectedCat === 'tyre_pressure' && latestDate && latestDetails) {
        lbl1.innerText = "Last Pressure";
        lbl2.innerText = "Last Checked";
        
        val1.innerText = latestDetails;
        val1.className = "text-2xl font-black text-blue-600 dark:text-blue-400";
        val2.innerText = new Date(latestDate).toLocaleDateString();

    } else {
        // Standard View
        lbl1.innerText = "Total Spent";
        lbl2.innerText = "Entries";
        val1.className = "text-2xl font-black text-blue-600 dark:text-blue-400";
        
        val1.innerText = `₹${sum.toLocaleString()}`;
        val2.innerText = count;
    }
}


// --- FIREBASE INIT (EXACTLY AS YOUR WORKING CODE) ---
const init = async () => {
try {
const user = await signInAnonymously(auth);
const colRef = collection(db, 'artifacts', 'ignis_v3', 'users', user.user.uid, 'data');

onSnapshot(colRef, (snap) => {
expensesData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
expensesData.sort((a, b) => new Date(b.date) - new Date(a.date));
updateUI();
});

document.getElementById('expense-form').onsubmit = async (e) => {
e.preventDefault();

// Gather core data exactly as before
const dataObj = {
category: categorySelect.value,
date: document.getElementById('date').value,
km: parseInt(document.getElementById('km').value) || 0,
cost: parseFloat(document.getElementById('cost').value) || 0,
};

// Apply details string exactly as your working code did
if (dataObj.category === 'fuel') {
    const liters = document.getElementById('dyn_fuel_liters')?.value;
    if (liters) {
        dataObj.liters = parseFloat(liters); // Number for math calculation
        dataObj.details = liters + " Liters"; // String for history log display
    }
} else if (dataObj.category === 'wiper_change') {
    dataObj.details = document.getElementById('dyn_wiper_pos')?.value;
} else if (dataObj.category === 'tyre_change') {
    dataObj.details = document.getElementById('dyn_tyre_qty')?.value + " Tyres";
} else if (dataObj.category === 'tyre_pressure') {
    // NEW: Save Tyre PSI details
    const psi = document.getElementById('dyn_tyre_psi')?.value;
    if (psi) dataObj.details = psi + " PSI";
}

await addDoc(colRef, dataObj);

switchTab('dashboard');
e.target.reset();
document.getElementById('date').valueAsDate = new Date();

// Reset dynamic field back to fuel
dynamicFields.innerHTML = `
    <label class="text-[10px] font-bold text-slate-400 uppercase">Fuel Volume (Liters)</label>
    <input type="number" step="0.01" id="dyn_fuel_liters" class="w-full bg-transparent font-bold py-1 outline-none dark:text-white appearance-none" placeholder="e.g. 30.5">
`;
dynamicFields.classList.remove('hidden');
categorySelect.value = 'fuel';

};

window.del = async (id) => {
if(confirm("Delete this record?")) {
await deleteDoc(doc(db, 'artifacts', 'ignis_v3', 'users', user.user.uid, 'data', id));
}
};

} catch (error) {
console.error("Firebase Error:", error);
alert("Could not connect to database.");
}
};

const categoryEmojis = {
fuel: '⛽', 
wash: '🧼', 
service: '⚙️', 
tyre_pressure: '💨', 
wheel_alignment: '🔧', 
wheel_rotation: '🔄', 
tyre_change: '🛞', 
wiper_change: '🌧️', 
insurance: '🛡️', 
puc: '📜',
other: '📝'
};

function updateUI() {
let total = 0, fuel = 0, service = 0, maxKm = 0;
const historyList = document.getElementById('history-list');
historyList.innerHTML = '';

// Gamification Variables
let fuelEntries = [];
let lastServiceKm = 0;
let lastWashDate = 0;
let lastPressureDate = 0;

expensesData.forEach(item => {
total += item.cost;
if(item.category === 'fuel') {
    fuel += item.cost;
    if(item.liters) fuelEntries.push(item);
}
if(item.category === 'service') {
    service += item.cost;
    if(item.km > lastServiceKm) lastServiceKm = item.km;
}
if(item.km > maxKm) maxKm = item.km;

if(item.category === 'wash') {
    let d = new Date(item.date).getTime();
    if(d > lastWashDate) lastWashDate = d;
}
if(item.category === 'tyre_pressure') {
    let d = new Date(item.date).getTime();
    if(d > lastPressureDate) lastPressureDate = d;
}

// Display exactly as working code
const emoji = categoryEmojis[item.category] || '📝';
let catName = item.category.replace('_', ' ');
if(item.details) { catName += ` (${item.details})`; }

historyList.innerHTML += `
                   <div class="bg-white dark:bg-slate-900 p-4 rounded-2xl border border-slate-100 dark:border-slate-800 flex justify-between items-center group">
                       <div class="flex items-center gap-3">
                           <div class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-lg">
                               ${emoji}
                           </div>
                           <div>
                               <p class="font-bold text-sm capitalize">${catName}</p>
                               <p class="text-[10px] font-bold text-slate-400 uppercase">${new Date(item.date).toLocaleDateString()} • ${item.km} KM</p>
                           </div>
                       </div>
                       <div class="text-right">
                           <p class="font-black text-blue-600 dark:text-blue-400">₹${item.cost}</p>
                           <button onclick="window.del('${item.id}')" class="text-xs text-red-400 dark:text-red-500 font-bold opacity-0 group-hover:opacity-100 transition-opacity">Delete</button>
                       </div>
                   </div>
               `;
});

// Calculate Health Score
let score = 100;
const now = new Date().getTime();
const dayInMs = 1000 * 3600 * 24;

if (lastWashDate > 0) {
    if ((now - lastWashDate) / dayInMs > 30) score -= 10;
    else if ((now - lastWashDate) / dayInMs > 14) score -= 5;
} else score -= 5;

if (lastPressureDate > 0) {
    if ((now - lastPressureDate) / dayInMs > 30) score -= 10;
    else if ((now - lastPressureDate) / dayInMs > 15) score -= 5;
}

if (lastServiceKm > 0) {
    const kmSinceService = maxKm - lastServiceKm;
    if (kmSinceService > 10000) score -= 20;
    else if (kmSinceService > 8500) score -= 10;
}

score = Math.max(0, score);
let healthColor = 'text-emerald-500';
if (score < 80) healthColor = 'text-yellow-500';
if (score < 60) healthColor = 'text-red-500';

document.getElementById('stat-health').innerText = `${score}%`;
document.getElementById('stat-health').className = `text-lg font-black ${healthColor}`;

// Cost Per KM
let costPerKm = maxKm > 0 ? (total / maxKm).toFixed(2) : "0.00";
document.getElementById('stat-cost-per-km').innerText = `₹${costPerKm}`;

// Mileage Calculator
let mileage = "0.0";
if (fuelEntries.length > 1) {
    fuelEntries.sort((a, b) => a.km - b.km);
    let distanceCovered = fuelEntries[fuelEntries.length - 1].km - fuelEntries[0].km;
    let litersUsed = 0;
    for (let i = 1; i < fuelEntries.length; i++) {
        litersUsed += fuelEntries[i].liters;
    }
    if (litersUsed > 0 && distanceCovered > 0) {
        mileage = (distanceCovered / litersUsed).toFixed(1);
    }
}
document.getElementById('stat-mileage').innerText = `${mileage} km/l`;

// Standard UI Updates
const avgCost = expensesData.length > 0 ? Math.round(total / expensesData.length) : 0;
document.getElementById('total-spent').innerText = `₹${total.toLocaleString()}`;
document.getElementById('stat-odo').innerText = `${maxKm.toLocaleString()} km`;
document.getElementById('stat-fuel').innerText = `₹${fuel.toLocaleString()}`;
document.getElementById('stat-service').innerText = `₹${service.toLocaleString()}`;
document.getElementById('stat-count').innerText = expensesData.length;
document.getElementById('history-count').innerText = `${expensesData.length} entries`;

updateInsights();
updateCharts();
}

function updateCharts() {
const isDark = document.documentElement.classList.contains('dark');
const color = isDark ? '#94a3b8' : '#64748b';
const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';

const catData = {};
expensesData.forEach(i => {
if(i.cost > 0) catData[i.category] = (catData[i.category] || 0) + i.cost;
});

if(categoryChart) categoryChart.destroy();
categoryChart = new Chart(document.getElementById('categoryChart'), {
type: 'doughnut',
data: {
labels: Object.keys(catData).map(k => k.replace('_', ' ').toUpperCase()),
datasets: [{ 
data: Object.values(catData), 
backgroundColor: ['#3b82f6', '#f59e0b', '#10b981', '#ef4444', '#8b5cf6', '#64748b', '#0ea5e9', '#f43f5e'], 
borderWidth: 0 
}]
},
options: { 
maintainAspectRatio: false, 
plugins: { legend: { position: 'right', labels: { color, font: { weight: 'bold', size: 10 } } } }, 
cutout: '70%' 
}
});

const timeMap = {};
[...expensesData].reverse().forEach(item => {
if(item.cost > 0) {
const d = new Date(item.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
timeMap[d] = (timeMap[d] || 0) + item.cost;
}
});

if(timelineChart) timelineChart.destroy();
timelineChart = new Chart(document.getElementById('timelineChart'), {
type: 'line',
data: {
labels: Object.keys(timeMap),
datasets: [{
label: 'Spent',
data: Object.values(timeMap),
borderColor: '#3b82f6',
backgroundColor: 'rgba(59, 130, 246, 0.1)',
fill: true,
tension: 0.4,
pointRadius: 4,
pointBackgroundColor: '#3b82f6'
}]
},
options: {
maintainAspectRatio: false,
scales: {
y: { grid: { color: gridColor }, ticks: { color, font: {size: 10} } },
x: { grid: { display: false }, ticks: { color, font: {size: 10} } }
},
plugins: { legend: { display: false } }
}
});
}

// Start app
init();
</script>
</body>
</html>
